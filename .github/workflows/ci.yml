name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Shared must be built first — web and server typecheck against its dist
      - run: npm run build -w packages/shared
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
